name: Update Deerfield flow history

on:
  schedule:
    # Every hour, on the hour (UTC). GitHub may delay scheduled runs under load.
    # Actions are free and unlimited on public repos; hourly is well within limits.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Allow the job to push the updated data files back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing on the same files.
concurrency:
  group: flow-history
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape current flows
        run: python scripts/scrape_deerfield.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Deerfield flow history ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          fi
